<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overflow — Cover Flow Music Player</title>
    <!-- Fonts bundled locally via @fontsource (no CDN dependency) -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { background: #08080c; overflow: hidden; }

      @keyframes bgFadeIn { from { opacity: 0; } to { opacity: 1; } }

      /* Global focus indicator */
      :focus-visible { outline: 2px solid #c9a66b; outline-offset: 2px; border-radius: 4px; }

      /* Seek bar — styled range input */
      .seek-bar {
        -webkit-appearance: none; appearance: none;
        width: 100%; max-width: 400px; height: 3px;
        background: transparent; cursor: pointer; display: block;
        position: relative;
      }
      .seek-bar::-webkit-slider-runnable-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,.08);
      }
      .seek-bar::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 13px; height: 13px; border-radius: 50%;
        background: #e0c992; margin-top: -5px; cursor: pointer;
        box-shadow: 0 0 8px rgba(201,166,107,.5);
      }
      .seek-bar::-moz-range-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,.08);
      }
      .seek-bar::-moz-range-thumb {
        width: 13px; height: 13px; border-radius: 50%;
        background: #e0c992; border: none; cursor: pointer;
        box-shadow: 0 0 8px rgba(201,166,107,.5);
      }
      .seek-bar:focus-visible { outline: none; }
      .seek-bar:focus-visible::-webkit-slider-thumb { outline: 2px solid #c9a66b; outline-offset: 2px; }

      /* Track list rows as buttons */
      .track-row {
        all: unset; display: flex; align-items: center; gap: 12px;
        padding: 8px; border-radius: 6px; cursor: pointer; width: 100%;
        box-sizing: border-box; transition: background .15s;
      }
      .track-row:hover { background: rgba(255,255,255,.03); }
      .track-row[aria-selected="true"] { background: rgba(201,166,107,.08); }
      .track-row:focus-visible { outline: 2px solid #c9a66b; outline-offset: -2px; }
      .track-fav { opacity: 0; transition: opacity .15s; }
      .track-fav[data-active] { opacity: 1; }
      .track-row:hover .track-fav { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
